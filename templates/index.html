<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CertiGen</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#eef2f7;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            background:white;
            width:550px;
            padding:35px;
            border-radius:15px;
            box-shadow:0 0 20px rgba(0,0,0,0.15);
        }

        h1{
            text-align:center;
            color:#1e40af;
            margin-bottom:10px;
        }

        h3{
            text-align:center;
            color:gray;
            margin-bottom:30px;
            font-weight:normal;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:8px;
        }

        input[type="file"]{
            width:100%;
            padding:10px;
            border:1px solid #ccc;
            border-radius:8px;
            margin-bottom:20px;
        }

        button{
            width:100%;
            padding:14px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-size:18px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }
    </style>

</head>

<body>

<div class="container">

    <h1>🎓 CertiGen</h1>

    <h3>Automated Certificate Generation System</h3>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <label>Upload Certificate Template</label>

        <input type="file" name="certificate" required>

        <label>Upload Excel File</label>

        <input type="file" name="excel" required>

        <br>

        <button type="submit">
            🚀 Generate Certificates
        </button>

    </form>

</div>

</body>

</html>
