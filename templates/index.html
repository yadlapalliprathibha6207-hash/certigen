<!DOCTYPE html>
<html>
<head>
    <title>CertiGen</title>
</head>
<body>

    <h1>🎓 CertiGen</h1>

    <h3>Automated Certificate Generation System</h3>

    <form action="/upload" method="POST" enctype="multipart/form-data">

        <p>Select Certificate Template:</p>
        <input type="file" name="certificate">

        <br><br>

        <p>Select Excel File:</p>
        <input type="file" name="excel">

        <br><br>

        <button type="submit">Generate Certificates</button>

    </form>

</body>
</html>
